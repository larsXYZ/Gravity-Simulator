[benchmark]
# Path to the benchmark executable
executable = build/bin/Release/Benchmark.exe

# Number of simulation iterations per run
iterations = 25

# Number of times to repeat each configuration (results are averaged)
runs_per_config = 3

# Comma-separated list of planet counts to test
planet_counts = 0, 10, 50, 100, 500, 1000

# Comma-separated list of particle counts to test
particle_counts = 0, 100, 200, 1000

[output]
# Directory where reports are saved (timestamped subdirectories are created automatically)
output_dir = benchmark_reports
